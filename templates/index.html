<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Todo List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>
    <h1>My Todo List</h1>
    
    <form action="/add" method="post">
        <input type="text" name="task" placeholder="Enter your task" required>
        <input type="date" name="start_date" required>
        <input type="date" name="end_date" required>
        <button type="submit">Add</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Task</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
       <tbody>
    {% for task in tasks %}
    <tr>
        <td class="{% if task.completed %}completed{% endif %}">
            {{ task.n_task }}
        </td>
        <td>{{ task.start_date }}</td>
        <td>{{ task.end_date }}</td>
        <td>
            {% if task.completed %}
                <i class="fa-solid fa-check"></i> Completed
            {% else %}
                {{ task.status }}
            {% endif %}
        </td>
        <td>
            {% if not task.completed %}
                <a href="/completed/{{ task.id }}" class="complete-link">
                    <i class="fa-solid fa-check"></i> Mark as Completed
                </a>
            {% endif %}
            <a href="/delete/{{ task.id }}" class="delete-link"> <i class="fa-solid fa-trash"></i> Delete
            </a>
        </td>
    </tr>
    {% endfor %}
</tbody>
    </table>

    <form action="/clear" method="post">
        <button type="submit">Clear all</button>
         
    <a href="/logout" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout  </a>

    </form>
  
</body>
</html>
